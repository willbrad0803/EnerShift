{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-[var(--light)] flex items-center justify-center py-16">
  <div class="bg-white rounded-3xl shadow-xl p-10 w-full max-w-md">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-[var(--dark)]">Sign in to EnerShift</h1>
      <p class="text-gray-600 mt-3">Access your flexibility dashboard</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">Username or Email</label>
          <input type="text" name="username" required 
                 class="w-full border border-gray-300 rounded-2xl px-6 py-4 focus:outline-none focus:border-[var(--primary)]">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input type="password" name="password" required 
                 class="w-full border border-gray-300 rounded-2xl px-6 py-4 focus:outline-none focus:border-[var(--primary)]">
        </div>
        <button type="submit" class="w-full cta-btn py-4 text-lg font-semibold">
          Sign In
        </button>
      </div>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Don't have an account? <a href="/admin/" class="text-[var(--primary)]">Create one in Admin</a>
    </p>
  </div>
</div>
{% endblock %}
